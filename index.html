<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product color saturation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #F5F5F3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 1.75rem 2rem 2rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 6px 32px rgba(0,0,0,0.09);
  }

  /* ── Description ── */
  .description {
    margin-bottom: 1.25rem;
    text-align: center;
    font-size: 0.88rem;
    color: #444;
    line-height: 1.65;
  }
  .description strong {
    display: block;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 0.4rem;
  }

  /* ── Image area ── */
  .image-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
    margin-bottom: 1.75rem;
  }
  .image-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: none;
  }
  /* z-index stacking: vivid on top, neutral middle, muted bottom */
  #img-p50 { z-index: 3; }
  #img-0   { z-index: 2; }
  #img-n50 { z-index: 1; opacity: 1; }

  /* ── Slider ── */
  .slider-section { user-select: none; }

  .slider-track-wrap {
    position: relative;
    height: 28px;
    cursor: pointer;
  }
  .slider-track {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    border-radius: 14px;
    /* -50% (muted) → 0% (neutral) → +50% (vivid) */
    background: linear-gradient(
      to right,
      #4a6582 0%,
      #2a4b9c 50%,
      #010897 100%
    );
  }
  /* center tick mark at 0% */
  .tick-center {
    position: absolute;
    top: 4px; bottom: 4px;
    left: 50%;
    width: 1.5px;
    background: rgba(255,255,255,0.5);
    transform: translateX(-50%);
    pointer-events: none;
  }
  .slider-dot {
    position: absolute;
    top: 50%;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    border: 2.5px solid #1a1a1a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    transform: translate(-50%, -50%);
    cursor: grab;
    z-index: 2;
  }
  .slider-dot:active { cursor: grabbing; }

  /* ── Endpoint labels ── */
  .slider-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
  }
  .slider-labels span {
    font-size: 0.62rem;
    color: #999;
    line-height: 1.3;
  }

  /* ── Percentage readout ── */
  .readout {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: #1a1a1a;
  }
</style>
</head>
<body>
<div class="card">

  <div class="description">
    <strong>Quick question</strong>
    You need a new water bottle. You'll use it every day — at work, at the gym, at the café. This is the one you're looking at. Which color do you go with?
  </div>

  <div class="image-wrap">
    <!-- -50%: least saturated (muted) — stays as base layer -->
    <img id="img-n50" src="bottle-n50.jpg" alt="Least saturated">
    <!-- 0%: neutral — middle layer -->
    <img id="img-0"   src="bottle-0.jpg"   alt="Neutral">
    <!-- +50%: most vivid — top layer -->
    <img id="img-p50" src="bottle-p50.jpg" alt="Most vivid">
  </div>

  <div class="slider-section">
    <div class="slider-track-wrap" id="track-wrap">
      <div class="slider-track"></div>
      <div class="tick-center"></div>
      <div class="slider-dot" id="dot"></div>
    </div>
    <div class="slider-labels">
      <span>Less saturated<br>−50%</span>
      <span>More saturated<br>+50%</span>
    </div>
  </div>

  <div class="readout" id="readout">0%</div>

</div>

<script>
  // ── Color nodes for the swatch (not shown but used for accurate readout color matching)
  // Slider range: -50 to +50, starting at 0 (center = 50% of track)
  const imgN50  = document.getElementById('img-n50');
  const img0    = document.getElementById('img-0');
  const imgP50  = document.getElementById('img-p50');
  const dot     = document.getElementById('dot');
  const trackWrap = document.getElementById('track-wrap');
  const readout = document.getElementById('readout');

  let currentVal = 0; // -50 to +50

  function update(val) {
    currentVal = Math.max(-50, Math.min(50, val));
    const pct = (currentVal + 50) / 100; // 0 at -50%, 0.5 at 0%, 1 at +50%
    dot.style.left = (pct * 100) + '%';    const displayVal = Math.round(currentVal);
    readout.textContent = (displayVal > 0 ? '+' : '') + displayVal + '%';

    if (currentVal >= 0) {
      // Blend between neutral (img-0) and vivid (img-p50)
      const t = currentVal / 50; // 0 at val=0, 1 at val=+50
      imgN50.style.opacity = 0;
      img0.style.opacity   = 1;   // base layer always opaque
      imgP50.style.opacity = t;   // top layer fades in
    } else {
      // Blend between muted (img-n50) and neutral (img-0)
      const t = (currentVal + 50) / 50; // 0 at val=-50, 1 at val=0
      imgN50.style.opacity = 1;   // base layer always opaque
      img0.style.opacity   = t;   // top layer fades in
      imgP50.style.opacity = 0;
    }
  }

  // ── Mouse drag ──────────────────────────────────────────────
  function valFromClientX(clientX) {
    const rect = trackWrap.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return (ratio * 100) - 50;
  }

  trackWrap.addEventListener('click', e => update(valFromClientX(e.clientX)));

  let dragging = false;
  dot.addEventListener('mousedown', e => { dragging = true; e.stopPropagation(); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (dragging) update(valFromClientX(e.clientX)); });
  document.addEventListener('mouseup', () => { dragging = false; });

  // ── Touch drag ──────────────────────────────────────────────
  dot.addEventListener('touchstart', e => { dragging = true; e.stopPropagation(); e.preventDefault(); }, { passive: false });
  document.addEventListener('touchmove', e => { if (dragging) update(valFromClientX(e.touches[0].clientX)); }, { passive: false });
  document.addEventListener('touchend', () => { dragging = false; });

  // ── Init ────────────────────────────────────────────────────
  update(0);
</script>

</body>
</html>
